<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Now Playing Settings</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 24px;
      max-width: 560px;
      background: #111;
      color: #eee;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1b1b1b;
      color: #fff;
    }
    button {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 0;
      cursor: pointer;
    }
    #status {
      margin-top: 12px;
      color: #9f9;
    }
  </style>
</head>
<body>
  <h2>Now Playing - OBS</h2>

  <label>
    WebSocket server address
    <input id="serverUrl" placeholder="ws://127.0.0.1:8000">
  </label>

  <button id="save">Save</button>
  <button id="test">Test connection</button>

  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
