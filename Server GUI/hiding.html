<!DOCTYPE html>
<html>
    <head>
	    <meta charset="UTF-8">
        <meta name="referrer" content="strict-origin-when-cross-origin" />
    </head>
<style>
    html, body {
        margin: 0px;
        overflow: hidden;
        background: transparent;
    }

    .info {
        overflow: hidden;
        padding-left: 10px;
        padding-right: 10px;
		flex: 1 1 auto;
		min-width: 0;
    }

	.widget {
		padding: 8px;
		background: var(--np-bg, rgb(44,44,44));
		border-radius: var(--np-radius, 4px);
		border-color: rgba(22,22,22,0.9);
		width: var(--np-width, auto);
		max-width: calc(100% - 16px);
		height: var(--np-height, 120px);
		box-shadow: 0px 0px var(--np-shadow, 5px) black;
		margin: 8px;
		position: relative;
		display: flex;
		gap: 10px;
		align-items: center;
	}

    #cover {
        height: var(--np-cover-size, 100%);
        max-height: 100%;
        width: auto;
        transition: opacity 0.38s ease-in-out;
		opacity: 1;
        aspect-ratio: 1;
        border-radius: 4px;
        box-shadow: 0 0 4px 4px rgba(0, 0, 0, .5) inset;
        object-fit: cover;
    }

    #content {
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
    }

    .hidden {
            opacity: 0 !important;
    }
	

    .image-box {
        border-radius: 4px;
        border-width: 1px;
        height: 100%;
		overflow: hidden;
        display: flex;
        align-items: center;
		flex: 0 0 auto;
    }

    .image-box img {
		display: block;
        border-radius: 4px;
    }

    #title {
        font-size: var(--np-title-size, 20px);
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    p {
        font-family: var(--np-font, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif);
        color: var(--np-text, #fff);
        margin: 0px;
        padding-bottom: 2px;
    }

    #artist {
        font-size: var(--np-artist-size, 16px);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
		display: var(--np-artist-show, 'block');
    }

    #progressbar,
    #progress {
        background-color: gray;
        height: var(--np-bar-height, 6px);
        width: 100%;
        margin-top: 5px;
        border-radius: 2px;
        transition: background-color 0.8s ease-in-out;
    }

    #progressbar {
        position: relative;
        margin-bottom: 4px;
    }

    #progress {
        background-color: var(--np-accent, rgb(223, 253, 179));
        width: 50%;
        position: absolute;
        top: -80%;
    }

	#timeline {
	  display: grid;
	  grid-template-columns: max-content 1fr max-content;
	  gap: 8px;
	  align-items: center;
	}

	#length, #time-passed {
	  font-size: calc(var(--np-artist-size, 16px) * 0.95);
	}
	
    /* Flags */
    body.compact .widget { padding: 6px; }
    body.compact #title { font-weight: 600; }
    body.no-cover .image-box { display: none; }
    body.no-timeline #timeline { display: none; }
	
	body.center .widget {
	  justify-content: center;
	}
	body.center .info {
	  flex: 0 1 auto;
	}
	body.center .info {
	  text-align: center;
	}

    /* marquee animation */
    .marquee { overflow: hidden; white-space: nowrap; }
    .marquee span { display: inline-block; padding-left: 100%; animation: scroll 12s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(0);} 100% { transform: translateX(-100%);} }
</style>

<body>
    <div class="widget" id="content">
        <div class="image-box">
            <img id="cover" src="https://i.ibb.co/z41bX3P/placeholder.png" alt="Image">
        </div>
        <div class="info">
            <p id="title">&nbsp;</p>
            <p id="artist">&nbsp;</p>
            <div id="timeline">
                <div>
                    <p id="time-passed">0:00</p>
                </div>
                <div id="progressbar">
                    <div id="progress"></div>
                </div>
                <div>
                    <p id="length">0:00</p>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    const PAUSED_PLACEHOLDER = "Nothing playing";
    const params = new URLSearchParams(location.search);
    const FETCH_URL = params.get('ws') || 'ws://localhost:8000/';
    const placeholder = "https://i.ibb.co/z41bX3P/placeholder.png";

    const demoCover = params.get('demoCover') || "";
    
    var last_cover = '';
    var last_artist = '';
    var last_title = '';
    var last_message_time = '';
    var hide_timeout = null;
    var conn = null;
    var join_interval = null;

    // CSS vars + флаги
    const root = document.documentElement;
    const setVar = (k, v) => { if (v) root.style.setProperty(k, v); };
	const accentParamRaw = (params.get('accent') || '').trim();
	const ACCENT_AUTO = !accentParamRaw || accentParamRaw.toLowerCase() === 'auto';
	const progressEl = document.getElementById('progress');

    setVar('--np-font', params.get('font'));
    setVar('--np-title-size', params.get('titleSize') ? params.get('titleSize') + 'px' : null);
    setVar('--np-artist-size', params.get('artistSize') ? params.get('artistSize') + 'px' : null);
    setVar('--np-bar-height', params.get('barHeight') ? params.get('barHeight') + 'px' : null);
    setVar('--np-radius', params.get('radius') ? params.get('radius') + 'px' : null);
    setVar('--np-shadow', params.get('shadow') ? params.get('shadow') + 'px' : null);
    setVar('--np-bg', params.get('bg'));
    setVar('--np-text', params.get('text'));
	setVar('--np-artist-show', params.get('artist') === "false" ? 'none': 'block');
    if (!ACCENT_AUTO) {
	  setVar('--np-accent', accentParamRaw);
	  progressEl.style.backgroundColor = '';
	}
    setVar('--np-height', params.get('height') ? params.get('height') + 'px' : null);
	setVar('--np-width', params.get('width') ? params.get('width') + 'px' : null);
	const cs = params.get('coverSize');
	if (cs && cs !== '0') setVar('--np-cover-size', cs + 'px');
	
	const align = (params.get('align') || '').toLowerCase();
	if (align === 'center') document.body.classList.add('center');
	
	const w = parseInt(params.get('width') || '0', 10);
	if (w && w < 420) document.body.classList.add('center');

    if (params.get('compact') === '1') document.body.classList.add('compact');
    if (params.get('cover') === '0') document.body.classList.add('no-cover');
    if (params.get('timeline') === '0') document.body.classList.add('no-timeline');
    const useMarquee = params.get('marquee') === '1';

    // Google Font
    const gfont = params.get('gfont');
    if (gfont) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(gfont)}&display=swap`;
        document.head.appendChild(link);
        const fam = gfont.split(':')[0].replace(/\+/g, ' ');
        const current = getComputedStyle(document.documentElement).getPropertyValue('--np-font').trim()
              || "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
        setVar('--np-font', `'${fam}', ${current}`);
    }

    if (demoCover) {
        document.getElementById('cover').src = demoCover;
    }

    function format_ms(s) {
        if (!s)
            return "0:00";
        var ms = s % 1000;
        s = Math.floor((s - ms) / 1000);
        var secs = s % 60;
        s = (s - secs) / 60;
        var mins = s % 60;
        var hrs = (s - mins) / 60;

        if (secs < 10)
            secs = '0' + secs;

        if (hrs > 0) {
            if (mins < 10)
                mins = '0' + mins;
            return hrs + ':' + mins + ':' + secs;
        }
        return mins + ':' + secs;
    }

    function calculate_brightness(packed_rgb) {
        let rgb = unpack_rgb(packed_rgb);
        const r = rgb[0] / 255;
        const g = rgb[1] / 255;
        const b = rgb[2] / 255;

        const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;

        return luminance;
    }

    function unpack_rgb(packed) {
        const r = (packed >> 16) & 0xFF;
        const g = (packed >> 8) & 0xFF;
        const b = packed & 0xFF;
        return [r, g, b];
    }

    function pack_rgb(r, g, b) {
        return (r << 16) | (g << 8) | b;
    }

    function increase_brightness(rgb, amount) {
        const [r, g, b] = rgb;

        // Calculate luminance
        const luminance = (0.299 * r) + (0.587 * g) + (0.114 * b);

        // Increase brightness based on luminance
        const increasedR = Math.min(r + (amount * (255 - luminance) / 255), 255);
        const increasedG = Math.min(g + (amount * (255 - luminance) / 255), 255);
        const increasedB = Math.min(b + (amount * (255 - luminance) / 255), 255);

        return [increasedR, increasedG, increasedB];
    }

    function extract_color_palette(url, num_colors) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";

            img.onload = function () {
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                const colorCounts = {};

                // Set the canvas dimensions to match the image
                canvas.width = img.width;
                canvas.height = img.height;

                // Draw the image onto the canvas
                ctx.drawImage(img, 0, 0);

                // Get the image data
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

                // Loop through each pixel in the image
                for (let i = 0; i < imageData.length; i += 4) {
                    const r = imageData[i];
                    const g = imageData[i + 1];
                    const b = imageData[i + 2];
                    const color = pack_rgb(r, g, b);

                    // Count the occurrences of each color
                    colorCounts[color] = (colorCounts[color] || 0) + 1;
                }

                // Sort the colors by count in descending order
                const sortedColors = Object.keys(colorCounts).sort(
                    (a, b) => colorCounts[b] - colorCounts[a]
                );

                // Return the top 'numColors' colors from the palette
                resolve(sortedColors.slice(0, num_colors));
            };

            img.onerror = function () {
                reject(new Error("Failed to load image."));
            };

            // Start loading the image
            img.src = url;
        });
    }

    function join() {
        conn = new WebSocket(FETCH_URL);

        conn.addEventListener('open', function (event) {
            console.log('Connection Established')
            conn.send('obs-source');
            if(join_interval){
                clearTimeout(join_interval);
                join_interval = null;
            };
        });

        conn.addEventListener('message', function (event) {
            fetch_data(JSON.parse(event.data));
            last_message_time = new Date().getTime() + 1000;
        });

        conn.addEventListener('close', function () {
            console.log("Connection closed, retrying...");
            clearTimeout(join_interval);
            join_interval = setTimeout(function(){join()}, 4000);
        });
    };

    function hideContent() {
        var content = document.getElementById("content");
        if(new Date().getTime() >= last_message_time){
            if (!content.classList.contains('hidden')) {
                content.classList.add('hidden');
            }
        }
        else {
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
            }
        };
        hideTimer();
    };

    function hideTimer() {
        if(hide_timeout){
            clearTimeout(hide_timeout);
            hide_timeout = setTimeout(hideContent, 1000);
        } else {
            hide_timeout = setTimeout(hideContent, 1000);
        }
    };
    
    function fetch_data(data) {
        var artists = '';
        var array = data['artists'] || []; // in some cases no artist is known/submitted
        for (var i = 0; i < array.length; i++) {
            artists += array[i];
            if (i < array.length - 1)
                artists += ', ';
        }


        if (data['title'] != last_title) {
            const node = document.getElementById('title');
            const text = data['title'] || PAUSED_PLACEHOLDER;
            if (useMarquee && text.length > 24) {
                node.classList.add('marquee');
                node.innerHTML = `<span>${text}&nbsp;&#8226;&nbsp;</span>`;
            } else {
                node.classList.remove('marquee');
                node.textContent = text;
            }
        }

        if (data['cover'] == undefined || data['cover'] == '') {
            document.getElementById('cover').src = demoCover || placeholder;

        } else if (data['cover'] !== last_cover || // Refresh only if meta data suggests that the cover changed
            (data['title'] !== last_title ||    // When using MPD the path is always the cover path configured in tuna
                artists !== last_artist))           // which means it won't change so we check against other data
        {
            // Random number at the end is to prevent caching
			
			var img_cover = document.getElementById('cover');
			img_cover.style.opacity = '0';
			setTimeout(() => {
				img_cover.src = data['cover'];
				// Apply the fade-in effect
				img_cover.style.opacity = '1';
			  }, 380);
			last_cover = data['cover'];

			if (ACCENT_AUTO) {
			  extract_color_palette(data['cover'], 10).then(palette => {
				  var brightest_value = 0;
				  var packed_rgb = palette[0];
				  for (var i = 0; i < palette.length; i++) {
					  let b = calculate_brightness(palette[i]);
					  if (b > brightest_value && b < 0.85) {
						  packed_rgb = palette[i];
						  brightest_value = b;
					  }
				  }
				  let rgb = unpack_rgb(packed_rgb);
				  if (brightest_value < 0.4) {
					  rgb = increase_brightness(rgb, 0.2);
				  }
				  document.getElementById('progress').style.backgroundColor = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
			  }).catch(() => {
				  document.getElementById('progress').style.backgroundColor = '';
			  });
			} else {
			  document.getElementById('progress').style.backgroundColor = '';
			}
        }

        if (artists != last_artist) {
            var artistLine = '';
            if (artists != '')
                artistLine += "<i>by</i> " + artists + " ";

            // use &nbsp; in case we have neither artist nor album
            // space is considered empty element, &nbsp; is not
            artistLine == '' ? document.getElementById('artist').innerHTML = "&nbsp;" : document.getElementById('artist').innerHTML = artistLine
			
        }

        var length = data['duration'];
        var progress = data['progress'];

        if (length && length > 0) {
            document.getElementById('progress').style.width = (progress / length) * 100 + '%';
        } else {
            document.getElementById('progress').style.width = '0%';
        }

        // Timestamps
        document.getElementById('length').innerText = format_ms(length);
        document.getElementById('time-passed').innerText = format_ms(progress);

        last_artist = artists;
        last_title = data['title'];
    };

    window.addEventListener('beforeunload', function (e) {
        conn.send("closed - OBS source");
    });

    hideTimer();
    join();
    
</script>

</html>
